<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/svg+xml" href="/favicon.svg">
	<link rel="apple-touch-icon" href="/apple-touch-icon.png">
	<link rel="manifest" href="/manifest.json">
	<meta name="theme-color" content="#161A22">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<title>Dashboard — Agreements</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/css/shared.css">
</head>
<body>
	<nav class="top-nav">
		<div class="nav-left">
			<a href="/dashboard.html" class="nav-brand">Agreements</a>
		</div>
		<div class="nav-right">
			<a href="/knowledge.html" class="nav-link">Knowledge</a>
			<a href="/settings.html" class="nav-link" id="settingsLink">Settings</a>
			<div class="nav-divider"></div>
			<button class="btn btn-ghost btn-sm" id="logoutBtn">Log out</button>
		</div>
	</nav>

	<div class="dashboard">
		<div class="dashboard-bar">
			<h1>Agreements</h1>
			<div class="dashboard-bar-right">
				<div class="search-wrapper">
					<input type="text" placeholder="Search agreements..." id="searchInput">
				</div>
				<select id="typeFilter" class="filter-select">
					<option value="">All types</option>
					<option value="mou_concept">MoU — Concept</option>
					<option value="mou_small">MoU — Small</option>
					<option value="full_services">Full Agreement</option>
				</select>
				<button class="btn btn-primary" id="createBtn">New Agreement</button>
			</div>
		</div>

		<div class="status-chips" id="statusTabs">
			<button class="chip active" data-status="">All</button>
			<button class="chip" data-status="draft">Draft</button>
			<button class="chip" data-status="sent">Sent</button>
			<button class="chip" data-status="viewed">Viewed</button>
			<button class="chip" data-status="signed">Signed</button>
			<button class="chip" data-status="countersigned">Countersigned</button>
		</div>

		<div class="agreements-grid" id="agreementsList"></div>
	</div>

	<!-- Create Modal -->
	<div class="modal" id="createModal" hidden>
		<div class="modal-backdrop"></div>
		<div class="modal-content">
			<div class="modal-header">
				<h2>New Agreement</h2>
				<button class="modal-close" id="closeModal">&times;</button>
			</div>
			<form id="createForm">
				<div class="form-group" style="margin-bottom:12px">
					<label>Agreement Type</label>
					<select id="createType" required>
						<option value="">Select type...</option>
						<option value="mou_concept">MoU — Concept</option>
						<option value="mou_small">MoU — Small Design</option>
						<option value="full_services">Agreement for Services</option>
					</select>
				</div>
				<div class="form-group" style="margin-bottom:12px">
					<label>Project Title</label>
					<input type="text" id="createTitle" required placeholder="e.g., Heritage Center Concept Design">
				</div>
				<div class="form-group" style="margin-bottom:12px">
					<label>Client Name (optional)</label>
					<input type="text" id="createClient" placeholder="e.g., Kansas Heritage Museum">
				</div>
				<div class="modal-actions">
					<button type="button" class="btn" id="cancelCreate">Cancel</button>
					<button type="submit" class="btn btn-primary">Create Agreement</button>
				</div>
			</form>
		</div>
	</div>

	<script src="/js/dashboard.bundle.js" type="module"></script>
</body>
</html>
