<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Agreements — Upland Exhibits</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/css/shared.css">
</head>
<body>
	<div class="login-page">
		<div class="login-container">
			<div class="login-brand">
				<h1>Agreements</h1>
				<p>Upland Exhibits</p>
			</div>
			<form class="login-form" id="loginForm">
				<div id="loginError" class="form-error" hidden></div>
				<div class="form-group">
					<label for="email">Email</label>
					<input type="email" id="email" required autocomplete="username">
				</div>
				<div class="form-group">
					<label for="password">Password</label>
					<input type="password" id="password" required autocomplete="current-password">
				</div>
				<button type="submit" class="btn btn-primary btn-full btn-lg">Sign In</button>
			</form>
			<p class="forgot-link"><a href="/forgot.html">Forgot password?</a></p>
		</div>
	</div>
	<script src="/js/login.bundle.js" type="module"></script>
</body>
</html>
