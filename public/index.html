<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Agreements — Login</title>
	<link rel="icon" type="image/svg+xml" href="/favicon.svg">
	<link rel="apple-touch-icon" href="/apple-touch-icon.png">
	<meta name="theme-color" content="#161A22">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
	<style>
		*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
		body{font-family:"DM Sans",system-ui,sans-serif;background:linear-gradient(160deg,#161a22 0%,#0a0d12 100%);color:#c8c5cc;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
		body::before{content:"";position:fixed;inset:0;opacity:0.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none}
		.login-container{display:flex;flex-direction:column;align-items:center;width:100%;max-width:320px;padding:2rem}
		.login-icon{margin-bottom:1.2rem;filter:drop-shadow(0 0 24px rgba(165,188,57,0.08)) drop-shadow(0 0 60px rgba(165,188,57,0.04))}
		.login-suite{font-size:0.6rem;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:#a5bc39;opacity:0.5;margin-bottom:0.3rem}
		h1{font-size:1.3rem;font-weight:600;color:#eae8ed;letter-spacing:-0.01em;margin-bottom:0.3rem;text-align:center}
		.subtitle{font-size:0.7rem;color:#605c66;margin-bottom:2rem;text-align:center}
		form{width:100%}
		.form-group{margin-bottom:1rem}
		label{display:block;font-size:0.65rem;font-weight:600;letter-spacing:0.06em;color:#605c66;margin-bottom:0.35rem}
		input[type="text"],input[type="email"],input[type="password"]{width:100%;padding:0.6rem 0.8rem;border-radius:6px;font-size:0.85rem;font-family:"DM Sans",system-ui,sans-serif;outline:none;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#ddd;transition:border-color 0.15s,box-shadow 0.15s}
		input:focus{border-color:#a5bc39;box-shadow:0 0 0 2px rgba(165,188,57,0.15)}
		.btn-primary{width:100%;padding:0.65rem;border:none;border-radius:6px;font-size:0.85rem;font-weight:600;font-family:"DM Sans",system-ui,sans-serif;cursor:pointer;margin-top:0.5rem;background:#a5bc39;color:#0c0d10;transition:background 0.15s}
		.btn-primary:hover{background:#b5cc48}
		.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
		.error{color:#ef4444;font-size:0.75rem;text-align:center;margin-top:0.75rem;min-height:1.2rem}
		.forgot-link{display:block;text-align:center;margin-top:1rem;font-size:0.7rem;color:#605c66;text-decoration:none}
		.forgot-link:hover{color:#a5bc39}
		.tagline{position:fixed;bottom:1.5rem;left:0;right:0;text-align:center;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:#605c66;opacity:0.4}
		@media(max-width:480px){.login-container{padding:1.5rem 1.25rem}.tagline{bottom:1rem}}
	</style>
</head>
<body>
	<div class="login-container">
		<div class="login-icon">
			<img src="/favicon.svg" width="72" height="72" alt="Agreements">
		</div>
		<div class="login-suite">Upland Workshop</div>
		<h1>Agreements</h1>
		<p class="subtitle">Contract generation & digital signing</p>
		<form id="loginForm">
			<div class="form-group">
				<label for="email">Email</label>
				<input type="email" id="email" name="email" required autocomplete="username" autofocus>
			</div>
			<div class="form-group">
				<label for="password">Password</label>
				<input type="password" id="password" name="password" required autocomplete="current-password">
			</div>
			<p id="loginError" class="error"></p>
			<button type="submit" class="btn-primary">Sign In</button>
			<a href="/forgot.html" class="forgot-link">Forgot password?</a>
		</form>
	</div>
	<div class="tagline">A workshop for the connected world&#8482;</div>
	<script type="module" src="/js/login.bundle.js"></script>
</body>
</html>
